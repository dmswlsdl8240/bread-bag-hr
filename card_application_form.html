<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명함 신청서</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A3C; --amber:#E8A33D; --amber-2:#C97F1F;
    --bg:#F4F6F8; --card:#FFFFFF; --line:#E4E8ED; --text:#1E2530; --sub:#6B7686;
    --ok:#2E9E5B; --ok-bg:#E7F6ED; --warn:#C94B4B; --warn-bg:#FBEAEA; --pending:#B9791C; --pending-bg:#FFF4E0;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Pretendard',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh;}
  header{background:var(--navy); color:#fff; padding:28px 24px; text-align:center;}
  header h1{margin:0 0 6px; font-size:20px; font-weight:700;}
  header p{margin:0; font-size:13px; color:#B9C4D3;}

  main{max-width:560px; margin:0 auto; padding:32px 20px 60px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:28px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}}
  label{font-size:12.5px; font-weight:600; color:var(--sub); display:block; margin-bottom:6px;}
  input, select{width:100%; padding:12px; border:1px solid var(--line); border-radius:9px; font-size:14.5px; font-family:inherit; background:#fbfcfd; color:var(--text);}
  input:focus, select:focus{outline:none; border-color:var(--amber);}
  .field{margin-bottom:16px;}
  .submit-btn{width:100%; background:var(--amber); color:#fff; border:none; border-radius:9px; padding:14px 22px; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px;}
  .submit-btn:hover{background:var(--amber-2);}
  .submit-btn:disabled{background:#D8DEE6; cursor:not-allowed;}
  .msg{font-size:13px; margin-top:14px; padding:11px 13px; border-radius:8px; display:none;}
  .msg.ok{display:block; background:var(--ok-bg); color:var(--ok);}
  .msg.err{display:block; background:var(--warn-bg); color:var(--warn);}
  .banner{background:var(--pending-bg); color:var(--pending); font-size:12.5px; padding:10px 20px; text-align:center; display:none;}
  .banner.show{display:block;}

  footer{text-align:center; padding:20px; font-size:11.5px; color:#9AA5B2;}
  footer a{color:#9AA5B2; text-decoration:underline; cursor:pointer;}

  .modal-bg{display:none; position:fixed; inset:0; background:rgba(20,26,36,.5); align-items:center; justify-content:center; z-index:100;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff; border-radius:14px; padding:26px; width:min(440px,92vw);}
  .modal h3{margin:0 0 4px;}
  .modal .desc{color:var(--sub); font-size:12.5px; margin-bottom:18px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}
  .btn-ghost{background:#fff; border:1px solid var(--line); border-radius:8px; padding:9px 16px; cursor:pointer; font-size:13px;}
</style>
</head>
<body>

<header>
  <h1>명함 신청서</h1>
  <p>정보를 입력해 신청해주세요. 확인 후 순차 발급됩니다.</p>
</header>

<div class="banner" id="connBanner">⚠ 아직 DB 연결이 설정되지 않았습니다. 관리자에게 문의해주세요.</div>

<main>
  <div class="card">
    <form id="applyForm">
      <div class="grid">
        <div class="field">
          <label>지점</label>
          <select id="f_branch" required><option value="">불러오는 중...</option></select>
        </div>
        <div class="field">
          <label>부서</label>
          <select id="f_dept" required><option value="">불러오는 중...</option></select>
        </div>
        <div class="field">
          <label>이름</label>
          <input id="f_name" required placeholder="홍길동">
        </div>
        <div class="field">
          <label>직급</label>
          <input id="f_position" required placeholder="예: 매니저, 사원" list="positionList">
          <datalist id="positionList"></datalist>
        </div>
        <div class="field">
          <label>입사일</label>
          <input id="f_hire" type="date" required>
        </div>
        <div class="field">
          <label>휴대폰번호</label>
          <input id="f_phone" required placeholder="010-0000-0000">
        </div>
      </div>
      <div class="field">
        <label>이메일 주소</label>
        <input id="f_email" type="email" required placeholder="name@company.com">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">신청하기</button>
      <div class="msg" id="applyMsg"></div>
    </form>
  </div>
</main>

<footer>
  이 신청서는 명함 발급 신청 전용입니다. &nbsp;·&nbsp; <a id="settingsLink">관리자용 DB 설정</a>
</footer>

<!-- 설정 모달 (관리자용, 평소엔 숨김) -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Supabase 연결 설정</h3>
    <div class="desc">이 브라우저에만 저장됩니다. (localStorage) 관리 시스템과 같은 프로젝트를 사용하면 설정이 공유됩니다.</div>
    <div class="field">
      <label>Project URL</label>
      <input id="cfgUrl" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="field">
      <label>Anon Public Key</label>
      <input id="cfgKey" placeholder="eyJhbGciOi...">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="cfgCancel">닫기</button>
      <button class="submit-btn" id="cfgSave" style="width:auto;">저장</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   Supabase 연결 설정 (하드코딩 금지 — 관리자가 최초 1회 입력/저장)
========================================================= */
const CFG_KEY = 'hr_supabase_cfg'; // 관리 시스템과 공용
let sb = null;

function getCfg(){
  try{ return JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); }catch(e){ return null; }
}
function initSupabase(){
  const cfg = getCfg();
  const banner = document.getElementById('connBanner');
  if(cfg && cfg.url && cfg.key){
    try{
      sb = supabase.createClient(cfg.url, cfg.key);
      banner.classList.remove('show');
      return true;
    }catch(e){ console.error(e); }
  }
  banner.classList.add('show');
  sb = null;
  return false;
}

document.getElementById('settingsLink').onclick = () => {
  const cfg = getCfg();
  if(cfg){ document.getElementById('cfgUrl').value = cfg.url; document.getElementById('cfgKey').value = cfg.key; }
  document.getElementById('modalBg').classList.add('show');
};
document.getElementById('cfgCancel').onclick = () => document.getElementById('modalBg').classList.remove('show');
document.getElementById('cfgSave').onclick = () => {
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  if(!url || !key){ alert('URL과 Key를 모두 입력하세요.'); return; }
  localStorage.setItem(CFG_KEY, JSON.stringify({url, key}));
  document.getElementById('modalBg').classList.remove('show');
  initSupabase();
  loadMasterData();
};

/* =========================================================
   마스터 데이터 (지점 / 부서 / 직급 자동완성) — DB에서 로드, 하드코딩 없음
========================================================= */
async function loadMasterData(){
  if(!sb) return;
  const { data: branches, error: be } = await sb.from('branches').select('id,name').eq('is_active', true).order('sort_order');
  if(!be && branches){
    document.getElementById('f_branch').innerHTML = '<option value="">선택하세요</option>' + branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  }
  const { data: depts, error: de } = await sb.from('departments').select('id,name').eq('is_active', true).order('sort_order');
  if(!de && depts){
    document.getElementById('f_dept').innerHTML = '<option value="">선택하세요</option>' + depts.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
  }
  const { data: positions } = await sb.from('card_applications').select('position').limit(200);
  if(positions){
    const uniq = [...new Set(positions.map(p=>p.position).filter(Boolean))];
    document.getElementById('positionList').innerHTML = uniq.map(p=>`<option value="${p}">`).join('');
  }
}

/* =========================================================
   신청 폼 제출
========================================================= */
document.getElementById('applyForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  if(!sb){ alert('DB 연결이 설정되지 않았습니다. 관리자에게 문의해주세요.'); return; }

  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('applyMsg');
  btn.disabled = true; msg.className='msg';

  const payload = {
    branch_id: document.getElementById('f_branch').value,
    department_id: document.getElementById('f_dept').value,
    name: document.getElementById('f_name').value.trim(),
    position: document.getElementById('f_position').value.trim(),
    hire_date: document.getElementById('f_hire').value,
    phone: document.getElementById('f_phone').value.trim(),
    email: document.getElementById('f_email').value.trim(),
  };

  const { error } = await sb.from('card_applications').insert(payload);
  btn.disabled = false;

  if(error){
    msg.textContent = '신청 중 오류가 발생했습니다: ' + error.message;
    msg.classList.add('err');
  } else {
    msg.textContent = '신청이 완료되었습니다. 확인 후 순차 발급됩니다.';
    msg.classList.add('ok');
    document.getElementById('applyForm').reset();
  }
});

/* =========================================================
   초기화
========================================================= */
(function init(){
  if(initSupabase()){
    loadMasterData();
  }
})();
</script>
</body>
</html>
